              <section id="projects" className="scroll-mt-24">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-2xl font-semibold text-gray-900 tracking-tight">
                    Featured Projects
                  </h2>
                  <span className="text-xs font-semibold bg-gray-100 text-gray-600 px-3 py-1 rounded-full border border-gray-200">
                    {projectsData.length} Projects Total
                  </span>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                  {projectsData.map((project, index) => (
                    <div key={index}>
                      <ProjectCard 
                        title={project.title} 
                        date={project.date} 
                        desc={project.desc} 
                        tags={project.tags} 
                        link={project.link} 
                        headerGrad={project.headerGrad} 
                      />
                    </div>
                  ))}
                </div>
              </section>

              {/* ===== GOOGLE CLOUD SHOWROOM FOR SKILL BADGES ===== */}
              <section id="cloud-badges" className="scroll-mt-24">
                <div className="google-dark-panel rounded-3xl p-8 md:p-12 text-white shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-80 h-80 bg-blue-600/10 rounded-full blur-3xl -mr-20 -mt-20"></div>
                  
                  <div className="text-center max-w-2xl mx-auto space-y-4 mb-10 relative z-10">
                    <h3 className="text-3xl md:text-4xl font-bold tracking-tight text-white flex items-center justify-center gap-3">
                      <span>My Certified Skill Set</span>
                      <a href="https://www.cloudskillsboost.google/public_profiles/4e2d36d2-64f3-4e4c-81b2-your-profile" target="_blank" rel="noreferrer" className="text-gray-400 hover:text-blue-400 transition text-xl" title="Verify Profile">
                        <i className="fas fa-external-link-alt text-lg"></i>
                      </a>
                    </h3>
                    
                    <div className="flex flex-wrap justify-center gap-2 pt-4">
                      {["All", "Featured", "AI Models", "Vertex AI", "Gemini", "Security", "Prompt design"].map((pill) => (
                        <button 
                          key={pill}
                          onClick={() => setActiveBadgeTab(pill)}
                          className={`px-4 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 ${
                            activeBadgeTab === pill 
                              ? "bg-white text-black border-white shadow-sm" 
                              : "bg-transparent text-gray-400 border-gray-800 hover:text-white hover:border-gray-600"
                          }`}
                        >
                          {pill}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 relative z-10">
                    {filteredBadges.map((badge, idx) => (
                      <a 
                        key={idx} 
                        href={badge.link} 
                        target="_blank" 
                        rel="noreferrer" 
                        className="google-dark-card rounded-2xl p-5 flex flex-col justify-between group block cursor-pointer"
                      >
                        <div className="space-y-3">
                          <div className="flex justify-between items-start gap-2">
                            <span className="mono-text text-[10px] text-blue-400 uppercase font-semibold tracking-widest bg-blue-950/40 border border-blue-900/40 px-2 py-0.5 rounded">
                              {badge.cat}
                            </span>
                            <span className="text-[10px] text-gray-500 font-medium mono-text">{badge.date}</span>
                          </div>
                          <h4 className="font-semibold text-sm text-gray-200 group-hover:text-blue-400 transition duration-150 leading-snug">
                            {badge.name}
                          </h4>
                        </div>
                        <div className="flex justify-end pt-4">
                          <div className="w-7 h-7 rounded-full bg-gray-900 border border-gray-800 flex items-center justify-center text-gray-500 group-hover:bg-blue-600 group-hover:text-white group-hover:border-blue-500 transition duration-200">
                            <i className="fas fa-arrow-right text-[10px]"></i>
                          </div>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              </section>

              {/* ===== EDUCATION SUMMARY ===== */}
              <section id="education" className="grid grid-cols-1 lg:grid-cols-12 gap-6 scroll-mt-24">
                <div className="lg:col-span-7">
                  <h2 className="text-2xl font-semibold text-gray-900 mb-6 tracking-tight">
                    Education
                  </h2>
                  <div className="bg-white/90 rounded-2xl border border-gray-200/60 p-6 space-y-5 shadow-sm backdrop-blur-md">
                    <div>
                      <div className="flex justify-between items-start gap-4 flex-wrap">
                        <h3 className="font-bold text-lg text-gray-900">B.Tech Information Technology</h3>
                        <span className="text-xs font-semibold bg-blue-50 text-[#1a73e8] border border-blue-100/60 px-3 py-1 rounded-full uppercase tracking-wider mono-text">Expected 2027</span>
                      </div>
                      <p className="text-sm text-gray-500 font-medium mt-0.5">Anna University, Regional Campus, Trichy</p>
                      <p className="text-sm font-bold text-[#1a73e8] mt-1">CGPA: 7 / 10</p>
                      <p className="text-xs text-gray-600 mt-3 bg-gray-50/50 p-3 rounded-xl border border-gray-200/40 leading-relaxed"><strong>Core Coursework:</strong> Data Structures & Algorithms, Operating Systems, DBMS, Computer Networks, System Design</p>
                    </div>
                    <div className="pt-5 border-t border-gray-100">
                      <div className="flex justify-between items-start gap-4 flex-wrap">
                        <h3 className="font-bold text-lg text-gray-900">Diploma in Computer Engineering</h3>
                        <span className="text-xs font-semibold bg-gray-100 text-gray-500 border border-gray-200 px-3 py-1 rounded-full uppercase tracking-wider mono-text">2024</span>
                      </div>
                      <p className="text-sm text-gray-500 font-medium mt-0.5">The Kavery Polytechnic College, Salem</p>
                      <p className="text-sm font-bold text-gray-600 mt-1">Percentage: 80%</p>
                      <p className="text-xs text-gray-600 mt-3 bg-gray-50/50 p-3 rounded-xl border border-gray-200/40 leading-relaxed"><strong>Core Foundation:</strong> Foundational programming paradigms, logical engineering metrics, database systems development</p>
                    </div>
                  </div>
                </div>
                
                <div className="lg:col-span-5">
                  <h2 className="text-2xl font-semibold text-gray-900 mb-6 tracking-tight">
                    Certifications & Stats
                  </h2>
                  <div className="bg-white/90 rounded-2xl border border-gray-200/60 p-6 space-y-4 shadow-sm backdrop-blur-md">
                    <div className="flex items-start gap-4">
                      <div className="w-9 h-9 rounded-xl bg-blue-50 text-[#4285F4] flex items-center justify-center flex-shrink-0 mt-0.5 border border-blue-100/60">
                        <i className="fas fa-certificate text-sm"></i>
                      </div>
                      <div>
                        <h4 className="font-semibold text-sm text-gray-900 bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">Google Cloud Certified</h4>
                        <p className="text-xs text-gray-500 leading-relaxed mt-0.5">Professional Cloud Architect credential validating multi-region infrastructure architecture optimization.</p>
                      </div>
                    </div>
                    <div className="flex items-start gap-4 pt-1">
                      <div className="w-9 h-9 rounded-xl bg-red-50 text-[#EA4335] flex items-center justify-center flex-shrink-0 mt-0.5 border border-red-100/60">
                        <i className="fas fa-terminal text-sm"></i>
                      </div>
                      <div>
                        <h4 className="font-semibold text-sm text-gray-900 bg-gradient-to-r from-red-600 to-pink-600 bg-clip-text text-transparent">Competitive Programming</h4>
                        <p className="text-xs text-gray-500 leading-relaxed mt-0.5">LeetCode Peak Rating of 1800+ with 350+ algorithms optimized. HackerRank 5-Star Python badge.</p>
                      </div>
                    </div>
                    <div className="flex items-start gap-4 pt-1">
                      <div className="w-9 h-9 rounded-xl bg-green-50 text-[#34A853] flex items-center justify-center flex-shrink-0 mt-0.5 border border-green-100/60">
                        <i className="fas fa-users text-sm"></i>
                      </div>
                      <div>
                        <h4 className="font-semibold text-sm text-gray-900 bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent">GDSC Technical Director</h4>
                        <p className="text-xs text-gray-500 leading-relaxed mt-0.5">Organized and presented 5+ technical workshops on DSA algorithms and structural systems engineering.</p>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* ===== FOOTER LINKS ===== */}
              <section id="contact" className="bg-white rounded-2xl border border-gray-200 p-8 text-center max-w-2xl mx-auto shadow-sm">
                <h2 className="text-2xl font-semibold text-gray-900 mb-1 tracking-tight">Let's connect</h2>
                <p className="text-sm text-gray-500 mb-6">Available for software engineering, web application engineering, and platform building initiatives.</p>
                <div className="flex flex-wrap justify-center gap-3 text-xs font-medium">
                  <button onClick={() => setIsModalOpen(true)} className="bg-gray-50 hover:bg-gray-100 text-gray-800 px-5 py-2.5 rounded-full flex items-center gap-2 transition border border-gray-200/50"><i className="fas fa-envelope text-[#4285F4]"></i> Open Contact Pipeline</button>
                  <a href="https://linkedin.com/in/naveen-dk" target="_blank" rel="noreferrer" className="bg-gray-50 hover:bg-gray-100 text-gray-800 px-5 py-2.5 rounded-full flex items-center gap-2 transition border border-gray-200/50"><i className="fab fa-linkedin text-[#1a73e8]"></i> LinkedIn</a>
                  <a href="https://github.com/naveen-dk" target="_blank" rel="noreferrer" className="bg-gray-50 hover:bg-gray-100 text-gray-800 px-5 py-2.5 rounded-full flex items-center gap-2 transition border border-gray-200/50"><i className="fab fa-github text-gray-900"></i> GitHub</a>
                </div>
                <div className="mt-8 text-xs text-slate-400 border-t border-gray-100 pt-5 font-normal">
                  © 2026 Naveen DK · Programmed cleanly following Google Material 3 Design Guidelines.
                </div>
              </section>

            </main>

            {/* ===== AUTOMATION INTERFACE MODAL ===== */}
            {isModalOpen && (
              <div className="fixed inset-0 bg-black/50 backdrop-blur-xs flex items-center justify-center z-[100] px-4 animate-fadeIn">
                <div className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl border border-gray-100 space-y-4">
                  <div className="flex justify-between items-center">
                    <h3 className="text-xl font-bold tracking-tight text-gray-900">Connect & Test Pipeline</h3>
                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600 transition text-lg"><i className="fas fa-times"></i></button>
                  </div>
                  <form onSubmit={handleEmailAutomation} className="space-y-3">
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 mb-1">Your Name</label>
                      <input required type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-[#4285F4]" placeholder="Recruiter / Networker" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 mb-1">Your Destination Email</label>
                      <input required type="email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="w-full px-4 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-[#4285F4]" placeholder="name@company.com" />
                    </div>
                    <div>
                      <label className="block text-xs font-semibold text-gray-500 mb-1">Message</label>
                      <textarea required rows="3" value={formData.message} onChange={(e) => setFormData({...formData, message: e.target.value})} className="w-full px-4 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:border-[#4285F4] resize-none" placeholder="Checked out your cloud projects..."></textarea>
                    </div>
                    <button disabled={isSending} type="submit" className="w-full bg-[#4285F4] text-white py-2.5 rounded-xl font-medium hover:bg-[#1a73e8] transition shadow-sm disabled:bg-gray-300">
                      {isSending ? "Dispatching..." : "Initialize Automation"}
                    </button>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
